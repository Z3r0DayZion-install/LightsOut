name: Bug report
description: Something broke in Lights Out
title: "[bug]: "
labels: bug
body:
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "3.9.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Windows version
      options:
        - Windows 11
        - Windows 10
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Open app\n2. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: log
    attributes:
      label: Audit log excerpt (optional)
      description: "%LOCALAPPDATA%\\CoolTimer\\actions.log — redact paths if needed"
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: This report does NOT involve an unexpected PC shutdown during testing
          required: true
