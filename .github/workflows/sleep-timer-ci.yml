name: Lights Out Release CI

# Validates, builds release artifacts, and optional installer. No GUI smoke (never launches app / never shuts down PC).
# Local equivalent:  $env:SLEEPTIMER_CI='1'; $env:SLEEPTIMER_DRY_RUN='1'; .\scripts\CI-Local.ps1

on:
  push:
    branches: [main, master]
    paths:
      - 'SleepTimer-Tonight.ps1'
      - 'scripts/**'
      - 'installer/**'
      - 'modules/**'
      - 'assets/**'
      - 'VERSION'
      - 'CHANGELOG.md'
      - '.github/workflows/sleep-timer-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '**'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_installer:
        description: 'Build Inno Setup installer'
        type: boolean
        default: true

concurrency:
  group: sleep-timer-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

env:
  CI: true
  SLEEPTIMER_CI: "1"
  SLEEPTIMER_DRY_RUN: "1"

jobs:
  validate:
    name: Validate
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run validation gates
        run: |
          ./scripts/Test-AgentSafety.ps1
          ./scripts/Test-Docs.ps1
          ./scripts/Test-SleepTimer.ps1
          ./scripts/Test-SleepTimer-Logic.ps1

      - name: Job summary
        if: always()
        shell: pwsh
        run: |
          $v = (Get-Content VERSION -Raw).Trim()
          @"
          ## Validate
          | Check | Status |
          |-------|--------|
          | VERSION | \`$v\` |
          | Parse gates | see log |
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

  build:
    name: Build Release
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.meta.outputs.version }}
      sha256: ${{ steps.meta.outputs.sha256 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PS2EXE
        shell: pwsh
        run: Install-Module ps2exe -Force -Scope CurrentUser -Repository PSGallery

      - name: Build release (no Desktop copy)
        shell: pwsh
        run: ./scripts/Build-Release.ps1 -SkipDesktop -SkipInstaller

      - name: Compute checksum
        id: meta
        shell: pwsh
        run: |
          $v = (Get-Content VERSION -Raw).Trim()
          $exe = 'dist/Release/SleepTimer.exe'
          $hash = (Get-FileHash $exe -Algorithm SHA256).Hash
          $size = (Get-Item $exe).Length
          "version=$v" >> $env:GITHUB_OUTPUT
          "sha256=$hash" >> $env:GITHUB_OUTPUT
          "size=$size" >> $env:GITHUB_OUTPUT
          $hash | Set-Content dist/Release/SHA256.txt -NoNewline
          @"
          ## Build
          | Artifact | Value |
          |----------|-------|
          | Version | **$v** |
          | File | \`SleepTimer.exe\` |
          | Size | $size bytes |
          | SHA256 | \`$hash\` |
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightsOut-Release-${{ steps.meta.outputs.version }}
          path: |
            dist/Release/SleepTimer.exe
            dist/Release/SleepTimer.ico
            dist/Release/LICENSE
            dist/Release/README.txt
            dist/Release/BUILD_INFO.txt
            dist/Release/SHA256.txt
          retention-days: 90
          if-no-files-found: error

  installer:
    name: Build Installer
    needs: build
    if: github.event.inputs.build_installer != 'false'
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build
        uses: actions/download-artifact@v4
        with:
          name: LightsOut-Release-${{ needs.build.outputs.version }}
          path: dist/Release

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          $iscc = @(
            (Get-Command ISCC.exe -ErrorAction SilentlyContinue | Select-Object -ExpandProperty Source)
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          ) | Where-Object { $_ -and (Test-Path $_) } | Select-Object -First 1
          if (-not $iscc) { throw 'ISCC not found after choco install' }
          & $iscc ./installer/lights-out.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: LightsOut-Setup-${{ needs.build.outputs.version }}
          path: installer/output/LightsOut-Setup-*.exe
          retention-days: 90
          if-no-files-found: error

  publish:
    name: Publish Release
    needs: [build, installer]
    if: github.event_name == 'release'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download portable
        uses: actions/download-artifact@v4
        with:
          name: LightsOut-Release-${{ needs.build.outputs.version }}
          path: release

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: LightsOut-Setup-${{ needs.build.outputs.version }}
          path: release

      - name: Attach to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/SleepTimer.exe
            release/LightsOut-Setup-*.exe
            release/SHA256.txt
          fail_on_unmatched_files: false

  ci-success:
    name: CI Success
    needs: [validate, build, installer]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Require green pipeline
        run: |
          V="${{ needs.validate.result }}"
          B="${{ needs.build.result }}"
          I="${{ needs.installer.result }}"
          echo "validate=$V build=$B installer=$I"
          ok=true
          if [ "$V" != "success" ] || [ "$B" != "success" ]; then ok=false; fi
          if [ "$I" != "success" ] && [ "$I" != "skipped" ]; then ok=false; fi
          if [ "$ok" != "true" ]; then
            echo "::error::One or more required jobs failed"
            exit 1
          fi
          echo "All Sleep Timer CI jobs passed."
